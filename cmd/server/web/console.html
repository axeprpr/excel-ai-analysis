<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Excel AI Analysis Console</title>
    <style>
      :root {
        --bg: #f5f1e8;
        --panel: #fffaf0;
        --ink: #1f2937;
        --muted: #6b7280;
        --accent: #a33f1f;
        --accent-soft: #f4d8cc;
        --line: #e5dccf;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "IBM Plex Sans", "PingFang SC", "Microsoft YaHei", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at top left, #fff7e8 0, transparent 35%),
          linear-gradient(180deg, #f7f0e5 0%, #f1e9dc 100%);
      }
      .shell {
        max-width: 1280px;
        margin: 0 auto;
        padding: 24px;
      }
      .hero {
        display: grid;
        grid-template-columns: 1.2fr .8fr;
        gap: 20px;
        margin-bottom: 20px;
      }
      .card {
        background: rgba(255,255,255,.88);
        border: 1px solid var(--line);
        border-radius: 18px;
        padding: 18px;
        box-shadow: 0 10px 30px rgba(77, 42, 20, .08);
        backdrop-filter: blur(6px);
      }
      h1, h2, h3 { margin: 0 0 12px; }
      h1 { font-size: 32px; }
      h2 { font-size: 18px; }
      p, label, input, select, button, textarea { font: inherit; }
      .muted { color: var(--muted); }
      .grid {
        display: grid;
        gap: 16px;
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
      .stack { display: grid; gap: 12px; }
      .field { display: grid; gap: 8px; }
      .field input, .field select, .field textarea {
        width: 100%;
        padding: 12px 14px;
        border: 1px solid var(--line);
        border-radius: 12px;
        background: #fff;
      }
      textarea { min-height: 120px; resize: vertical; }
      button {
        border: 0;
        border-radius: 999px;
        padding: 12px 18px;
        background: var(--accent);
        color: white;
        cursor: pointer;
      }
      button.secondary {
        background: #ede2d2;
        color: var(--ink);
      }
      .toolbar {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }
      .pill {
        display: inline-flex;
        align-items: center;
        border-radius: 999px;
        background: var(--accent-soft);
        color: var(--accent);
        padding: 6px 10px;
        font-size: 13px;
        margin: 4px 6px 0 0;
      }
      .two-col {
        display: grid;
        grid-template-columns: 320px minmax(0, 1fr);
        gap: 20px;
      }
      .session-list {
        max-height: 540px;
        overflow: auto;
        display: grid;
        gap: 10px;
      }
      .session-item {
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 12px;
        background: #fff;
        cursor: pointer;
      }
      .session-item.active {
        border-color: var(--accent);
        background: #fff4ef;
      }
      pre {
        background: #1f2937;
        color: #f9fafb;
        border-radius: 14px;
        padding: 14px;
        overflow: auto;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        background: white;
      }
      th, td {
        text-align: left;
        padding: 10px;
        border-bottom: 1px solid var(--line);
      }
      .chart-box {
        min-height: 240px;
        border: 1px dashed var(--line);
        border-radius: 16px;
        background: #fff;
        padding: 16px;
      }
      .bars {
        display: grid;
        gap: 12px;
      }
      .bar-row { display: grid; gap: 6px; }
      .bar-track {
        height: 14px;
        border-radius: 999px;
        background: #f0e8db;
        overflow: hidden;
      }
      .bar-fill {
        height: 100%;
        background: linear-gradient(90deg, #cb5b37, #ef8d5b);
      }
      .status {
        position: sticky;
        bottom: 16px;
        margin-top: 16px;
      }
      @media (max-width: 960px) {
        .hero, .two-col, .grid { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <section class="hero">
        <div class="card">
          <h1>Excel AI Analysis</h1>
          <p class="muted">本地会话式 Excel 问数控制台。支持模型配置、文件上传、自然语言提问，以及 `data` / `mermaid` / `mcp` 三种图表输出模式。</p>
          <div class="toolbar" id="statusPills"></div>
        </div>
        <div class="card stack">
          <h2>全局状态</h2>
          <div id="globalStatus" class="muted">加载中...</div>
        </div>
      </section>

      <section class="grid">
        <div class="card stack">
          <h2>模型配置</h2>
          <div class="field"><label>Provider</label><input id="provider" placeholder="openai / openrouter / local" /></div>
          <div class="field"><label>Model</label><input id="model" placeholder="gpt-5.1 / qwen / deepseek" /></div>
          <div class="field"><label>Base URL</label><input id="baseUrl" placeholder="https://api.openai.com/v1" /></div>
          <div class="field"><label>API Key</label><input id="apiKey" placeholder="sk-..." /></div>
          <div class="field"><label>默认图表模式</label>
            <select id="defaultChartMode">
              <option value="data">data</option>
              <option value="mermaid">mermaid</option>
              <option value="mcp">mcp</option>
            </select>
          </div>
          <div class="field"><label>MCP Server URL</label><input id="mcpServerUrl" placeholder="http://chart-mcp:1122/mcp" /></div>
          <div class="toolbar">
            <button id="saveSettingsBtn">保存配置</button>
            <button class="secondary" id="reloadSettingsBtn">重新加载</button>
          </div>
        </div>

        <div class="card stack">
          <h2>当前会话操作</h2>
          <div class="toolbar">
            <button id="createSessionBtn">创建 Session</button>
            <button class="secondary" id="refreshSessionsBtn">刷新 Session 列表</button>
          </div>
          <div id="currentSessionInfo" class="muted">尚未选择 Session</div>
          <div class="field"><label>上传文件</label><input id="fileInput" type="file" multiple /></div>
          <button id="uploadBtn">上传到当前 Session</button>
        </div>
      </section>

      <section class="two-col" style="margin-top: 20px;">
        <div class="card stack">
          <h2>Sessions</h2>
          <div id="sessionList" class="session-list"></div>
        </div>

        <div class="stack">
          <div class="card stack">
            <h2>对话问数</h2>
            <div class="field"><label>问题</label><textarea id="questionInput" placeholder="例如：按月展示销售趋势"></textarea></div>
            <div class="field"><label>图表模式</label>
              <select id="chartMode">
                <option value="data">data</option>
                <option value="mermaid">mermaid</option>
                <option value="mcp">mcp</option>
              </select>
            </div>
            <button id="askBtn">发送问题</button>
          </div>

          <div class="card stack">
            <h2>问答结果</h2>
            <div id="resultMeta" class="muted">暂无结果</div>
            <div class="chart-box" id="chartBox"></div>
            <div id="tableBox"></div>
            <pre id="rawBox">等待查询...</pre>
          </div>
        </div>
      </section>

      <div class="status card muted" id="statusBar">准备就绪</div>
    </div>

    <script>
      const state = {
        sessions: [],
        currentSessionId: "",
        settings: null
      };

      const el = (id) => document.getElementById(id);

      async function api(path, options = {}) {
        const res = await fetch(path, {
          headers: { "Content-Type": "application/json", ...(options.headers || {}) },
          ...options
        });
        const contentType = res.headers.get("content-type") || "";
        const body = contentType.includes("application/json") ? await res.json() : await res.text();
        if (!res.ok) {
          throw new Error(typeof body === "string" ? body : JSON.stringify(body));
        }
        return body;
      }

      function setStatus(text) {
        el("statusBar").textContent = text;
      }

      function renderStatusPills(status) {
        const pills = [];
        pills.push(`<span class="pill">sessions: ${status.session_count ?? 0}</span>`);
        pills.push(`<span class="pill">ready: ${status.ready_session_count ?? 0}</span>`);
        pills.push(`<span class="pill">files: ${status.uploaded_file_count ?? 0}</span>`);
        pills.push(`<span class="pill">tables: ${status.imported_table_count ?? 0}</span>`);
        el("statusPills").innerHTML = pills.join("");
      }

      async function loadGlobalStatus() {
        const status = await api("/api/status");
        el("globalStatus").innerHTML = `
          <div>Sessions: <strong>${status.session_count}</strong></div>
          <div>Ready Sessions: <strong>${status.ready_session_count}</strong></div>
          <div>Uploaded Files: <strong>${status.uploaded_file_count}</strong></div>
          <div>Imported Tables: <strong>${status.imported_table_count}</strong></div>
        `;
        renderStatusPills(status);
      }

      async function loadSettings() {
        const settings = await api("/api/settings/model");
        state.settings = settings;
        el("provider").value = settings.provider || "";
        el("model").value = settings.model || "";
        el("baseUrl").value = settings.base_url || "";
        el("apiKey").value = settings.api_key || "";
        el("defaultChartMode").value = settings.default_chart_mode || "data";
        el("chartMode").value = settings.default_chart_mode || "data";
        el("mcpServerUrl").value = settings.mcp_server_url || "";
      }

      async function saveSettings() {
        const payload = {
          provider: el("provider").value,
          model: el("model").value,
          base_url: el("baseUrl").value,
          api_key: el("apiKey").value,
          default_chart_mode: el("defaultChartMode").value,
          mcp_server_url: el("mcpServerUrl").value
        };
        await api("/api/settings/model", { method: "PUT", body: JSON.stringify(payload) });
        setStatus("模型配置已保存");
      }

      async function loadSessions() {
        const resp = await api("/api/sessions");
        state.sessions = resp.sessions || [];
        renderSessions();
      }

      function renderSessions() {
        const root = el("sessionList");
        if (!state.sessions.length) {
          root.innerHTML = `<div class="muted">还没有 session</div>`;
          return;
        }
        root.innerHTML = state.sessions.map((session) => `
          <div class="session-item ${session.session_id === state.currentSessionId ? "active" : ""}" data-id="${session.session_id}">
            <div><strong>${session.session_id}</strong></div>
            <div class="muted">status: ${session.status}</div>
            <div class="muted">files: ${session.uploaded_file_count} / tables: ${session.table_count}</div>
          </div>
        `).join("");
        root.querySelectorAll(".session-item").forEach((item) => {
          item.addEventListener("click", () => selectSession(item.dataset.id));
        });
      }

      async function selectSession(id) {
        state.currentSessionId = id;
        renderSessions();
        const session = await api(`/api/sessions/${id}`);
        el("currentSessionInfo").innerHTML = `
          <div><strong>${session.session_id}</strong></div>
          <div class="muted">status: ${session.status}</div>
          <div class="muted">files: ${session.uploaded_file_count} / tables: ${session.table_count} / rows: ${session.total_row_count}</div>
        `;
      }

      async function createSession() {
        const session = await api("/api/sessions", { method: "POST" });
        setStatus(`已创建 ${session.session_id}`);
        await loadSessions();
        await selectSession(session.session_id);
        await loadGlobalStatus();
      }

      async function uploadFiles() {
        if (!state.currentSessionId) throw new Error("请先创建或选择 Session");
        const files = el("fileInput").files;
        if (!files.length) throw new Error("请选择文件");
        const form = new FormData();
        Array.from(files).forEach((file) => form.append("file", file));
        const res = await fetch(`/api/sessions/${state.currentSessionId}/files/upload`, { method: "POST", body: form });
        const body = await res.json();
        if (!res.ok) throw new Error(JSON.stringify(body));
        setStatus(`上传成功，任务 ${body.task_id}`);
        await loadSessions();
        await selectSession(state.currentSessionId);
        await loadGlobalStatus();
      }

      async function askQuestion() {
        if (!state.currentSessionId) throw new Error("请先选择 Session");
        const payload = {
          question: el("questionInput").value,
          chart_mode: el("chartMode").value
        };
        const resp = await api(`/api/sessions/${state.currentSessionId}/query`, {
          method: "POST",
          body: JSON.stringify(payload)
        });
        renderResult(resp);
      }

      function renderResult(resp) {
        el("resultMeta").innerHTML = `
          <div><strong>${resp.summary}</strong></div>
          <div class="muted">mode: ${resp.chart_mode} / executed: ${resp.executed} / rows: ${resp.row_count}</div>
          <div class="muted">sql: ${resp.sql}</div>
        `;
        renderChart(resp);
        renderTable(resp.columns || [], resp.rows || []);
        el("rawBox").textContent = JSON.stringify(resp, null, 2);
      }

      function renderChart(resp) {
        const box = el("chartBox");
        const chart = resp.chart || {};
        if (chart.mode === "mermaid") {
          box.innerHTML = `<h3>Mermaid</h3><pre>${escapeHtml(chart.content || "")}</pre>`;
          return;
        }
        if (chart.mode === "mcp") {
          box.innerHTML = `
            <h3>MCP</h3>
            <div class="muted">endpoint: ${escapeHtml(chart.endpoint || "")}</div>
            <pre>${escapeHtml(JSON.stringify(chart.payload || {}, null, 2))}</pre>
          `;
          return;
        }

        const rows = chart.rows || [];
        const cols = chart.columns || [];
        if (!rows.length || cols.length < 2) {
          box.innerHTML = `<div class="muted">暂无图表数据</div>`;
          return;
        }
        const xKey = resp.visualization?.x || cols[0];
        const yKey = resp.visualization?.y || cols[cols.length - 1];
        const max = Math.max(...rows.map((row) => Number(row[yKey]) || 0), 1);
        box.innerHTML = `
          <h3>Data Chart</h3>
          <div class="bars">
            ${rows.map((row) => `
              <div class="bar-row">
                <div>${escapeHtml(String(row[xKey]))} · ${Number(row[yKey]) || 0}</div>
                <div class="bar-track"><div class="bar-fill" style="width:${((Number(row[yKey]) || 0) / max) * 100}%"></div></div>
              </div>
            `).join("")}
          </div>
        `;
      }

      function renderTable(columns, rows) {
        if (!columns.length) {
          el("tableBox").innerHTML = "";
          return;
        }
        el("tableBox").innerHTML = `
          <table>
            <thead><tr>${columns.map((col) => `<th>${escapeHtml(String(col))}</th>`).join("")}</tr></thead>
            <tbody>
              ${rows.map((row) => `<tr>${columns.map((col) => `<td>${escapeHtml(String(row[col] ?? ""))}</td>`).join("")}</tr>`).join("")}
            </tbody>
          </table>
        `;
      }

      function escapeHtml(text) {
        return text
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;");
      }

      async function boot() {
        try {
          await loadGlobalStatus();
          await loadSettings();
          await loadSessions();
          setStatus("控制台已加载");
        } catch (err) {
          setStatus(`初始化失败: ${err.message}`);
        }
      }

      el("saveSettingsBtn").addEventListener("click", async () => {
        try { await saveSettings(); } catch (err) { setStatus(err.message); }
      });
      el("reloadSettingsBtn").addEventListener("click", async () => {
        try { await loadSettings(); setStatus("模型配置已刷新"); } catch (err) { setStatus(err.message); }
      });
      el("createSessionBtn").addEventListener("click", async () => {
        try { await createSession(); } catch (err) { setStatus(err.message); }
      });
      el("refreshSessionsBtn").addEventListener("click", async () => {
        try { await loadSessions(); await loadGlobalStatus(); setStatus("session 列表已刷新"); } catch (err) { setStatus(err.message); }
      });
      el("uploadBtn").addEventListener("click", async () => {
        try { await uploadFiles(); } catch (err) { setStatus(err.message); }
      });
      el("askBtn").addEventListener("click", async () => {
        try { await askQuestion(); } catch (err) { setStatus(err.message); }
      });

      boot();
    </script>
  </body>
</html>
