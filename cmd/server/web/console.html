<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Excel AI Analysis Console</title>
  </head>
  <body>
    <h1>Excel AI Analysis Console</h1>

    <p>
      <button id="openSettingsBtn" type="button">设置</button>
      <button id="refreshSessionsBtn" type="button">刷新 Session</button>
      <button id="refreshStatusBtn" type="button">刷新状态</button>
    </p>

    <p id="statusText">准备就绪</p>
    <pre id="globalStatus">等待状态...</pre>

    <hr />

    <h2>会话</h2>
    <label for="sessionSelect">Session:</label>
    <select id="sessionSelect">
      <option value="">自动创建（上传时）</option>
    </select>
    <pre id="sessionInfo">未选择 Session</pre>

    <hr />

    <h2>对话</h2>
    <p>
      <label for="chartMode">chart_mode:</label>
      <select id="chartMode">
        <option value="data">data</option>
        <option value="mermaid">mermaid</option>
        <option value="mcp">mcp</option>
      </select>
    </p>
    <p>
      <label for="fileInput">文件（可选，上传会自动创建/复用 Session）:</label><br />
      <input id="fileInput" type="file" multiple />
    </p>
    <p>
      <label for="questionInput">问题:</label><br />
      <textarea id="questionInput" rows="6" cols="100" placeholder="例如：帮我做上网行为分析"></textarea>
    </p>
    <p>
      <button id="sendBtn" type="button">发送</button>
    </p>

    <h3>结果摘要</h3>
    <pre id="summaryBox">暂无结果</pre>

    <h3>结果表格</h3>
    <div id="tableBox"></div>

    <h3>完整响应</h3>
    <pre id="rawBox">等待查询...</pre>

    <dialog id="settingsDialog">
      <form method="dialog">
        <h2>模型设置</h2>
        <p>
          <label for="provider">Provider:</label><br />
          <input id="provider" />
        </p>
        <p>
          <label for="model">Model:</label><br />
          <input id="model" />
        </p>
        <p>
          <label for="baseUrl">Base URL:</label><br />
          <input id="baseUrl" />
        </p>
        <p>
          <label for="apiKey">API Key:</label><br />
          <input id="apiKey" />
        </p>
        <p>
          <label for="defaultChartMode">默认 chart_mode:</label><br />
          <select id="defaultChartMode">
            <option value="data">data</option>
            <option value="mermaid">mermaid</option>
            <option value="mcp">mcp</option>
          </select>
        </p>
        <p>
          <label for="mcpServerUrl">MCP Server URL:</label><br />
          <input id="mcpServerUrl" />
        </p>
        <p>
          <button id="saveSettingsBtn" type="button">保存设置</button>
          <button id="reloadSettingsBtn" type="button">重新加载</button>
          <button id="closeSettingsBtn" value="cancel">关闭</button>
        </p>
      </form>
    </dialog>

    <script>
      const state = {
        sessions: [],
        currentSessionId: "",
      };

      const el = (id) => document.getElementById(id);

      function setStatus(text) {
        el("statusText").textContent = text;
      }

      async function api(path, options = {}) {
        const res = await fetch(path, {
          headers: { "Content-Type": "application/json", ...(options.headers || {}) },
          ...options,
        });
        const contentType = res.headers.get("content-type") || "";
        const body = contentType.includes("application/json") ? await res.json() : await res.text();
        if (!res.ok) {
          throw new Error(typeof body === "string" ? body : JSON.stringify(body));
        }
        return body;
      }

      function escapeHtml(input) {
        return String(input)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;");
      }

      async function loadGlobalStatus() {
        const status = await api("/api/status");
        el("globalStatus").textContent = JSON.stringify(status, null, 2);
      }

      async function loadSettings() {
        const settings = await api("/api/settings/model");
        el("provider").value = settings.provider || "";
        el("model").value = settings.model || "";
        el("baseUrl").value = settings.base_url || "";
        el("apiKey").value = settings.api_key || "";
        el("defaultChartMode").value = settings.default_chart_mode || "data";
        el("mcpServerUrl").value = settings.mcp_server_url || "";
        el("chartMode").value = settings.default_chart_mode || "data";
      }

      async function saveSettings() {
        const payload = {
          provider: el("provider").value,
          model: el("model").value,
          base_url: el("baseUrl").value,
          api_key: el("apiKey").value,
          default_chart_mode: el("defaultChartMode").value,
          mcp_server_url: el("mcpServerUrl").value,
        };
        await api("/api/settings/model", { method: "PUT", body: JSON.stringify(payload) });
        setStatus("设置已保存");
      }

      async function loadSessions() {
        const resp = await api("/api/sessions");
        state.sessions = resp.sessions || [];
        const selected = state.currentSessionId;

        const select = el("sessionSelect");
        select.innerHTML = `<option value="">自动创建（上传时）</option>`;
        for (const session of state.sessions) {
          const option = document.createElement("option");
          option.value = session.session_id;
          option.textContent = `${session.session_id} (${session.status})`;
          select.appendChild(option);
        }
        if (selected && state.sessions.some((s) => s.session_id === selected)) {
          select.value = selected;
        } else {
          select.value = "";
          state.currentSessionId = "";
        }
      }

      async function onSessionChange() {
        state.currentSessionId = el("sessionSelect").value;
        if (!state.currentSessionId) {
          el("sessionInfo").textContent = "未选择 Session（上传时会自动创建）";
          return;
        }
        const session = await api(`/api/sessions/${state.currentSessionId}`);
        el("sessionInfo").textContent = JSON.stringify(session, null, 2);
      }

      function renderTable(columns, rows) {
        if (!Array.isArray(columns) || columns.length === 0) {
          el("tableBox").innerHTML = "";
          return;
        }
        const header = columns.map((c) => `<th>${escapeHtml(c)}</th>`).join("");
        const body = (rows || [])
          .map((row) => `<tr>${columns.map((c) => `<td>${escapeHtml(row[c] ?? "")}</td>`).join("")}</tr>`)
          .join("");
        el("tableBox").innerHTML = `<table border="1" cellspacing="0" cellpadding="6"><thead><tr>${header}</tr></thead><tbody>${body}</tbody></table>`;
      }

      function renderAnswer(answer) {
        el("summaryBox").textContent = `${answer.summary || ""}\nmode=${answer.chart_mode} executed=${answer.executed} row_count=${answer.row_count}`;
        renderTable(answer.columns, answer.rows);
        el("rawBox").textContent = JSON.stringify(answer, null, 2);
      }

      async function sendQuestion() {
        const question = el("questionInput").value.trim();
        const chartMode = el("chartMode").value;
        const files = el("fileInput").files;
        if (!question && files.length === 0) {
          throw new Error("请至少输入问题或选择文件");
        }

        if (files.length > 0) {
          const form = new FormData();
          form.append("question", question);
          form.append("chart_mode", chartMode);
          if (state.currentSessionId) {
            form.append("session_id", state.currentSessionId);
          }
          for (const file of files) {
            form.append("file", file);
          }
          const res = await fetch("/api/chat/upload", { method: "POST", body: form });
          const body = await res.json();
          if (!res.ok) {
            throw new Error(JSON.stringify(body));
          }
          state.currentSessionId = body.session_id || state.currentSessionId;
          await loadSessions();
          if (state.currentSessionId) {
            el("sessionSelect").value = state.currentSessionId;
            await onSessionChange();
          }
          renderAnswer(body.answer || body);
          setStatus(`上传并处理完成，session=${state.currentSessionId}`);
          el("fileInput").value = "";
          return;
        }

        if (!state.currentSessionId) {
          throw new Error("没有可用 session，请先上传文件");
        }
        const body = await api("/api/chat/query", {
          method: "POST",
          body: JSON.stringify({
            session_id: state.currentSessionId,
            question,
            chart_mode: chartMode,
          }),
        });
        renderAnswer(body.answer || body);
        setStatus(`查询完成，session=${state.currentSessionId}`);
      }

      async function boot() {
        await loadGlobalStatus();
        await loadSettings();
        await loadSessions();
        setStatus("已加载");
      }

      el("openSettingsBtn").addEventListener("click", () => el("settingsDialog").showModal());
      el("closeSettingsBtn").addEventListener("click", () => el("settingsDialog").close());
      el("saveSettingsBtn").addEventListener("click", async () => {
        try {
          await saveSettings();
        } catch (err) {
          setStatus(err.message);
        }
      });
      el("reloadSettingsBtn").addEventListener("click", async () => {
        try {
          await loadSettings();
          setStatus("设置已刷新");
        } catch (err) {
          setStatus(err.message);
        }
      });
      el("refreshStatusBtn").addEventListener("click", async () => {
        try {
          await loadGlobalStatus();
          setStatus("状态已刷新");
        } catch (err) {
          setStatus(err.message);
        }
      });
      el("refreshSessionsBtn").addEventListener("click", async () => {
        try {
          await loadSessions();
          await onSessionChange();
          setStatus("Session 已刷新");
        } catch (err) {
          setStatus(err.message);
        }
      });
      el("sessionSelect").addEventListener("change", async () => {
        try {
          await onSessionChange();
          setStatus("Session 已切换");
        } catch (err) {
          setStatus(err.message);
        }
      });
      el("sendBtn").addEventListener("click", async () => {
        try {
          await sendQuestion();
        } catch (err) {
          setStatus(err.message);
        }
      });

      boot().catch((err) => setStatus(err.message));
    </script>
  </body>
</html>
