services:
  excel-ai-analysis:
    build:
      context: .
      dockerfile: Dockerfile
    image: excel-ai-analysis:local
    ports:
      - "8080:8080"
    environment:
      ADDR: ":8080"
      DATA_DIR: /app/data
      APP_VERSION: compose-local
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/readyz"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    volumes:
      - ./data:/app/data
    depends_on:
      chart-mcp:
        condition: service_started
      frontend:
        condition: service_started

  chart-mcp:
    image: node:20-bookworm
    working_dir: /app
    command: ["npx", "-y", "@antv/mcp-server-chart", "--transport", "streamable", "--host", "0.0.0.0", "--port", "1122"]
    ports:
      - "1122:1122"

  frontend:
    image: node:20-bookworm
    working_dir: /app
    command: ["bash", "-lc", "npm install && npm run dev -- --host 0.0.0.0 --port 4173"]
    environment:
      VITE_API_PROXY_TARGET: http://excel-ai-analysis:8080
    ports:
      - "4173:4173"
    volumes:
      - ./frontend:/app
