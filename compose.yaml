services:
  excel-ai-analysis:
    build:
      context: .
      dockerfile: Dockerfile
    image: excel-ai-analysis:local
    ports:
      - "8080:8080"
    environment:
      ADDR: ":8080"
      DATA_DIR: /app/data
      APP_VERSION: compose-local
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/readyz"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    volumes:
      - ./data:/app/data
    depends_on:
      chart-mcp:
        condition: service_started

  chart-mcp:
    build:
      context: .
      dockerfile: Dockerfile.chart-mcp
    image: excel-ai-analysis-chart-mcp:local
    ports:
      - "1122:1122"
